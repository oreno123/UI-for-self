<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Studio - 选风格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--bg2:#f8f8f8;--text:#1a1a1a;--text2:#666;--border:#e0e0e0;
  --hover:#f0f0f0;--accent:#0090ff;--selection-ring:#0090ff;
}
.dark{
  --bg:#111111;--bg2:#1a1a1a;--text:#eeeeee;--text2:#999;--border:#333;
  --hover:#222;--accent:#3b9eff;--selection-ring:#3b9eff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;padding:0 0 100px 0}

header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px);transition:background .3s}
header .left{display:flex;align-items:center;gap:12px}
header .logo{font-size:15px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
header .logo span{color:var(--text2);font-weight:400}
header .step{font-size:13px;font-weight:600;background:var(--accent);color:#fff;padding:3px 10px;border-radius:20px}
header .controls{display:flex;gap:8px}
.toggle-btn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .2s}
.toggle-btn:hover{background:var(--hover)}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.color-bar{max-width:1400px;margin:0 auto;padding:12px 24px 0;display:none}
.color-bar.show{display:block}
.color-bar-inner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2)}
.color-bar-inner strong{color:var(--text);font-weight:600}
.color-dots{display:flex;gap:4px;margin-left:8px}
.color-dot{width:20px;height:20px;border-radius:4px;border:1px solid var(--border)}

.tabs{max-width:1400px;margin:0 auto;padding:16px 24px 0;display:flex;gap:4px}
.tab{padding:8px 20px;border-radius:8px 8px 0 0;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);border-bottom:none;background:var(--bg2);color:var(--text2);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg);color:var(--accent);border-color:var(--accent);border-bottom:1px solid var(--bg);position:relative;z-index:1}
.tab-content{display:none}
.tab-content.active{display:block}

main{max-width:1400px;margin:0 auto;padding:20px 24px}

.section{margin-bottom:32px}
.section-title{font-size:16px;font-weight:700;margin-bottom:4px}
.section-desc{font-size:13px;color:var(--text2);margin-bottom:14px}

.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* Card */
.style-card{
  border:2px solid var(--border);border-radius:12px;cursor:pointer;
  transition:all .2s;position:relative;background:var(--bg);overflow:hidden;
}
.style-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.style-card.selected{border-color:var(--selection-ring);box-shadow:0 0 0 2px var(--selection-ring)}
.style-card .card-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:600;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;z-index:2;display:none}
.style-card.selected .card-badge{display:block}
.card-body{padding:12px 14px 14px}
.card-name{font-size:14px;font-weight:700;margin-bottom:2px}
.card-name-en{font-size:11px;color:var(--text2);font-weight:400;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.card-tags .tag{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--text2);background:var(--bg2)}

/* Preview area */
.preview{
  width:100%;height:90px;position:relative;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.preview .p-bg{position:absolute;inset:0}
.preview .p-line{position:absolute;border-radius:2px}
.preview .p-block{position:absolute;border-radius:3px}
.preview .p-circle{position:absolute;border-radius:50%}
.preview .p-text{position:absolute;white-space:nowrap;overflow:hidden}
.preview .p-bar{position:absolute;height:3px;border-radius:1.5px}

/* Sub-style selector */
.sub-styles{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none}
.style-card.selected .sub-styles{display:block}
.sub-style-option{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;margin:2px 3px 2px 0;
  border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;
  background:var(--bg2);transition:all .15s;
}
.sub-style-option:hover{border-color:var(--accent)}
.sub-style-option.active{border-color:var(--accent);background:rgba(0,144,255,.1);color:var(--accent);font-weight:600}
.sub-style-dot{width:10px;height:10px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}

/* Bottom bar */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);border-top:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
  transition:background .3s;backdrop-filter:blur(8px);
}
.bottom-bar .info{font-size:13px;color:var(--text2);white-space:nowrap}
.bottom-bar .selection{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.bottom-bar .selection.empty{color:var(--text2);font-weight:400}
.confirm-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.confirm-btn:hover{opacity:.85}
.confirm-btn:disabled{opacity:.4;cursor:default}

.success-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.success-overlay.show{display:flex}
.success-card{background:var(--bg);border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.success-card h2{font-size:20px;font-weight:700;margin-bottom:8px}
.success-card p{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.success-card .result-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:left;font-family:monospace;font-size:12px;line-height:1.5;color:var(--text);max-height:200px;overflow-y:auto;word-break:break-all;margin-bottom:16px}
.success-card .close-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer}
.success-card .close-btn:hover{opacity:.85}

@media(max-width:900px){
  .style-grid{grid-template-columns:1fr}
  main{padding:16px}
}
</style>
</head>
<body>
<header>
  <div class="left">
    <div class="logo">Design Studio <span>/ Step 2</span></div>
    <div class="step">选风格</div>
  </div>
  <div class="controls">
    <button class="toggle-btn" id="darkToggle" onclick="toggleDark()">&#9790; Dark</button>
  </div>
</header>

<div class="color-bar" id="colorBar">
  <div class="color-bar-inner">
    <strong>你的选色:</strong>
    <div class="color-dots" id="colorDots"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="ppt" onclick="switchTab('ppt')">PPT 演示文稿</div>
  <div class="tab" data-tab="web" onclick="switchTab('web')">网页</div>
</div>

<main>
  <div class="tab-content active" id="tab-ppt"></div>
  <div class="tab-content" id="tab-web"></div>
</main>

<div class="bottom-bar">
  <div class="info">已选:</div>
  <div class="selection empty" id="selectionText">点击卡片选择风格</div>
  <button class="confirm-btn" id="confirmBtn" disabled onclick="confirmSelection()">确认选择</button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <h2>风格已选定</h2>
    <p>已复制到剪贴板，请回到 Claude Code 粘贴结果。<br>也可以手动复制下方文本：</p>
    <div class="result-box" id="resultBox"></div>
    <button class="close-btn" onclick="closeOverlay()">返回修改</button>
    <button class="close-btn" style="background:var(--accent);margin-top:8px" onclick="goToTastePicker()">下一步：品味约束 →</button>
  </div>
</div>

<script>
// Preview: each style has a `pv` object with bg, fg, accent, and layout hints
// Layout types: hero(center big title), split(half/half), grid(blocks), sidebar, minimal, code, magazine, dark-bold
function buildPreview(pv) {
  const {bg, fg, accent, accent2, layout} = pv;
  const f = fg || '#fff';
  const a = accent || '#0090ff';
  let inner = `<div class="p-bg" style="background:${bg}"></div>`;

  switch(layout) {
    case 'hero': // Centered big title + subtitle
      inner += `
        <div class="p-text" style="top:22px;left:0;right:0;text-align:center;font-size:18px;font-weight:800;color:${f};letter-spacing:-0.02em">TITLE</div>
        <div class="p-bar" style="bottom:26px;left:50%;transform:translateX(-50%);width:40px;background:${a}"></div>
        <div class="p-text" style="bottom:14px;left:0;right:0;text-align:center;font-size:8px;color:${f};opacity:.5">subtitle text here</div>`;
      break;
    case 'hero-serif':
      inner += `
        <div class="p-text" style="top:18px;left:0;right:0;text-align:center;font-family:Georgia,serif;font-size:20px;font-weight:700;color:${f};letter-spacing:-0.02em">TITLE</div>
        <div class="p-text" style="top:44px;left:0;right:0;text-align:center;font-family:Georgia,serif;font-size:8px;color:${f};opacity:.4">subtitle goes here</div>
        <div class="p-bar" style="bottom:18px;left:50%;transform:translateX(-50%);width:30px;background:${a}"></div>`;
      break;
    case 'split': // Left text, right color block
      inner += `
        <div class="p-block" style="right:0;top:0;bottom:0;width:40%;background:${a}"></div>
        <div class="p-text" style="top:24px;left:14px;font-size:12px;font-weight:800;color:${f}">Title</div>
        <div class="p-bar" style="top:42px;left:14px;width:50px;height:2px;background:${f};opacity:.3"></div>
        <div class="p-text" style="top:50px;left:14px;font-size:7px;color:${f};opacity:.4">Description text</div>`;
      break;
    case 'grid': // Color block grid
      inner += `
        <div class="p-block" style="left:8%;top:12%;width:25%;height:35%;background:${a};opacity:.9"></div>
        <div class="p-block" style="left:36%;top:12%;width:25%;height:35%;background:${a};opacity:.5"></div>
        <div class="p-block" style="left:64%;top:12%;width:28%;height:35%;background:${accent2||a};opacity:.3"></div>
        <div class="p-text" style="bottom:14px;left:8%;font-size:10px;font-weight:700;color:${f}">Grid Layout</div>
        <div class="p-bar" style="bottom:10px;left:8%;width:30px;height:2px;background:${a}"></div>`;
      break;
    case 'sidebar': // Left sidebar + content
      inner += `
        <div class="p-block" style="left:0;top:0;bottom:0;width:25%;background:${a}"></div>
        <div class="p-text" style="top:16px;left:30%;font-size:9px;font-weight:700;color:${f}">Section Title</div>
        <div class="p-bar" style="top:30px;left:30%;width:40px;height:2px;background:${a}"></div>
        <div class="p-line" style="top:38px;left:30%;width:55%;height:3px;background:${f};opacity:.12;border-radius:1px"></div>
        <div class="p-line" style="top:45px;left:30%;width:45%;height:3px;background:${f};opacity:.08;border-radius:1px"></div>
        <div class="p-line" style="top:52px;left:30%;width:50%;height:3px;background:${f};opacity:.06;border-radius:1px"></div>
        <div class="p-line" style="top:62px;left:30%;width:35%;height:3px;background:${f};opacity:.12;border-radius:1px"></div>
        <div class="p-line" style="top:69px;left:30%;width:40%;height:3px;background:${f};opacity:.08;border-radius:1px"></div>`;
      break;
    case 'minimal':
      inner += `
        <div class="p-text" style="top:30px;left:16px;font-size:11px;font-weight:300;color:${f};letter-spacing:0.05em">Minimal</div>
        <div class="p-bar" style="top:48px;left:16px;width:20px;height:2px;background:${a}"></div>`;
      break;
    case 'code':
      inner += `
        <div class="p-text" style="top:10px;left:10px;font-family:monospace;font-size:7px;color:${a}">const</div>
        <div class="p-text" style="top:10px;left:42px;font-family:monospace;font-size:7px;color:${f}">title =</div>
        <div class="p-text" style="top:10px;left:80px;font-family:monospace;font-size:7px;color:${accent2||'#e5c07b'}">"Hello"</div>
        <div class="p-line" style="top:22px;left:10px;width:85%;height:1px;background:${f};opacity:.06"></div>
        <div class="p-text" style="top:28px;left:10px;font-family:monospace;font-size:7px;color:${f};opacity:.4">// your content</div>
        <div class="p-text" style="top:40px;left:10px;font-family:monospace;font-size:7px;color:${a}">function</div>
        <div class="p-text" style="top:40px;left:56px;font-family:monospace;font-size:7px;color:${accent2||'#e5c07b'}">render()</div>
        <div class="p-text" style="top:52px;left:10px;font-family:monospace;font-size:7px;color:${f};opacity:.3">  return ...</div>
        <div class="p-text" style="top:64px;left:10px;font-family:monospace;font-size:7px;color:${f};opacity:.2">}</div>`;
      break;
    case 'magazine':
      inner += `
        <div class="p-text" style="top:10px;left:12px;font-family:Georgia,serif;font-size:22px;font-weight:900;color:${f};line-height:1">Magazine</div>
        <div class="p-bar" style="top:38px;left:12px;width:80%;height:2px;background:${a}"></div>
        <div class="p-line" style="top:48px;left:12px;width:70%;height:2px;background:${f};opacity:.15;border-radius:1px"></div>
        <div class="p-line" style="top:55px;left:12px;width:60%;height:2px;background:${f};opacity:.10;border-radius:1px"></div>
        <div class="p-text" style="bottom:10px;right:12px;font-size:7px;color:${f};opacity:.3">Page 01</div>`;
      break;
    case 'dark-bold':
      inner += `
        <div class="p-text" style="top:16px;left:14px;font-size:24px;font-weight:900;color:${a};letter-spacing:-0.03em">BOLD</div>
        <div class="p-text" style="top:48px;left:14px;font-size:8px;font-weight:600;color:${f};opacity:.5">Your tagline here</div>`;
      break;
    case 'warm-center':
      inner += `
        <div class="p-block" style="left:0;top:0;bottom:0;width:100%;background:${bg};opacity:.5"></div>
        <div class="p-text" style="top:20px;left:0;right:0;text-align:center;font-family:Georgia,serif;font-size:14px;font-weight:700;color:${f}">Warm Title</div>
        <div class="p-text" style="top:40px;left:0;right:0;text-align:center;font-size:7px;color:${f};opacity:.4">elegant & refined</div>
        <div class="p-circle" style="bottom:14px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:${a}"></div>`;
      break;
    case 'gradient-hero':
      inner += `
        <div class="p-bg" style="background:linear-gradient(135deg,${bg},${accent2||a})"></div>
        <div class="p-text" style="top:24px;left:0;right:0;text-align:center;font-size:14px;font-weight:800;color:${f}">Gradient</div>
        <div class="p-text" style="top:44px;left:0;right:0;text-align:center;font-size:7px;color:${f};opacity:.6">Beautiful gradients</div>`;
      break;
    case 'zen':
      inner += `
        <div class="p-text" style="top:34px;left:0;right:0;text-align:center;font-size:11px;font-weight:300;color:${f};letter-spacing:0.15em">zen</div>
        <div class="p-bar" style="top:50px;left:50%;transform:translateX(-50%);width:12px;height:1px;background:${f};opacity:.3"></div>`;
      break;
    case 'brutalist':
      inner += `
        <div class="p-block" style="left:8px;top:8px;right:8px;bottom:8px;border:2px solid ${f}"></div>
        <div class="p-text" style="top:20px;left:16px;font-size:14px;font-weight:900;color:${f}">RAW</div>
        <div class="p-block" style="right:16px;top:20px;width:20px;height:20px;background:${a}"></div>
        <div class="p-text" style="bottom:20px;left:16px;font-size:7px;color:${a}">brutalist style</div>`;
      break;
    case 'pixel':
      const px = 'background:${a};width:6px;height:6px;position:absolute';
      inner += `
        <div style="${px};top:20px;left:20px"></div>
        <div style="${px};top:20px;left:28px"></div>
        <div style="${px};top:20px;left:36px"></div>
        <div style="${px};top:28px;left:20px"></div>
        <div style="${px};top:28px;left:36px"></div>
        <div style="${px};top:36px;left:20px"></div>
        <div style="${px};top:36px;left:28px"></div>
        <div style="${px};top:36px;left:36px"></div>
        <div style="position:absolute;top:52px;left:20px;font-size:7px;font-weight:700;color:${f};font-family:monospace">8-BIT</div>`;
      break;
    case 'card-grid':
      inner += `
        <div class="p-block" style="left:6%;top:10%;width:41%;height:35%;background:${a};opacity:.8;border-radius:4px"></div>
        <div class="p-block" style="left:52%;top:10%;width:42%;height:35%;background:${accent2||a};opacity:.5;border-radius:4px"></div>
        <div class="p-block" style="left:6%;top:52%;width:41%;height:35%;background:${accent2||a};opacity:.3;border-radius:4px"></div>
        <div class="p-block" style="left:52%;top:52%;width:42%;height:35%;background:${a};opacity:.6;border-radius:4px"></div>`;
      break;
    default: // 'center' fallback
      inner += `
        <div class="p-text" style="top:24px;left:0;right:0;text-align:center;font-size:14px;font-weight:700;color:${f}">Title</div>
        <div class="p-bar" style="top:44px;left:50%;transform:translateX(-50%);width:30px;background:${a}"></div>
        <div class="p-text" style="bottom:16px;left:0;right:0;text-align:center;font-size:7px;color:${f};opacity:.4">description</div>`;
  }
  return `<div class="preview">${inner}</div>`;
}

// ── Style Data ──
const PPT_SECTIONS = [
  {
    title: "Guizang PPT",
    styles: [
      {
        id:"guizang-magazine",name:"电子杂志风",nameEn:"E-Magazine × E-Ink",
        desc:"衬线字体 + 流体背景 + 暖色纸质调。墨香纸韵，文化展示、品牌故事。",
        tags:["衬线体","流体背景","暖色调"],
        pv:{bg:'#2c2c2c',fg:'#d4c5a9',accent:'#8b7355',layout:'hero-serif'},
        subs:[
          {name:"Monocle 经典",colors:["#2c2c2c","#8b7355","#d4c5a9"]},
          {name:"靛蓝瓷器",colors:["#1a1a2e","#4a6fa5","#e8d5b7"]},
          {name:"森林水墨",colors:["#1a2e1a","#4a7c59","#d4d4c0"]},
          {name:"牛皮纸",colors:["#3e2f1c","#a08060","#e8dcc8"]},
          {name:"沙丘",colors:["#2e2518","#c4956a","#f0e6d6"]},
        ]
      },
      {
        id:"guizang-swiss",name:"瑞士国际主义",nameEn:"Swiss International",
        desc:"无衬线字体 + 严格网格 + 单色高亮。理性克制，数据报告、商业提案。",
        tags:["无衬线","网格系统","高对比"],
        pv:{bg:'#000',fg:'#fff',accent:'#002fa7',layout:'grid'},
        subs:[
          {name:"克莱因蓝",colors:["#002fa7","#ffffff","#000000"]},
          {name:"柠檬黄",colors:["#fff000","#1a1a1a","#ffffff"]},
          {name:"柠檬绿",colors:["#00ff00","#0a0a0a","#ffffff"]},
          {name:"安全橙",colors:["#ff6600","#1a1a1a","#ffffff"]},
        ]
      }
    ]
  },
  {
    title: "Theme Factory",
    styles: [

let currentTab = 'ppt';
let selectedStyle = null;
let selectedSub = null;
let isDark = false;

function loadColors() {
  try {
    const params = new URLSearchParams(window.location.search);
    const c = params.get('colors');
    if (c) {
      const userColors = JSON.parse(decodeURIComponent(c));
      document.getElementById('colorBar').classList.add('show');
      document.getElementById('colorDots').innerHTML = userColors.colors.map(c =>
        `<div class="color-dot" style="background:${c.hex}" title="${c.name} ${c.step}"></div>`
      ).join('');
    }
  } catch(e) {}
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + tab));
}

function renderPPT() {
  const container = document.getElementById('tab-ppt');
  let html = '';
  for (const section of PPT_SECTIONS) {
    html += `<div class="section"><div class="section-title">${section.title}</div><div class="style-grid">`;
    for (const s of section.styles) {
      const hasSubs = s.subs && s.subs.length > 0;
      // Use first sub-style colors for initial preview if available
      const initPv = hasSubs ? {bg:s.subs[0].colors[0], fg:s.subs[0].colors[1], accent:s.subs[0].colors[2], layout:s.pv.layout} : s.pv;
      html += `<div class="style-card" data-id="${s.id}" data-layout="${s.pv.layout}" onclick="selectStyle('${s.id}',this)">
        <div class="card-badge">已选</div>
        <div class="preview-wrap">${buildPreview(initPv)}</div>
        <div class="card-body">
          <div class="card-name">${s.name}</div>
          <div class="card-name-en">${s.nameEn||''}</div>
          <div class="card-desc">${s.desc}</div>
          <div class="card-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          ${hasSubs?`<div class="sub-styles">${s.subs.map((sub,i)=>`<span class="sub-style-option${i===0?' active':''}" data-sub="${sub.name}" onclick="event.stopPropagation();selectSub('${s.id}','${sub.name}',this)">${sub.colors.map(c=>`<span class="sub-style-dot" style="background:${c}"></span>`).join('')}${sub.name}</span>`).join('')}</div>`:''}
        </div>
      </div>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function renderWeb() {
  const container = document.getElementById('tab-web');
  let html = '<div class="section"><div class="section-title">品牌风格模板</div><div class="section-desc">选择一个品牌视觉风格作为网页设计参考</div><div class="style-grid">';
  for (const s of WEB_STYLES) {
    html += `<div class="style-card" data-id="${s.id}" onclick="selectStyle('${s.id}',this)">
      <div class="card-badge">已选</div>
      ${buildPreview(s.pv)}
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  }
  html += '</div></div>';
  container.innerHTML = html;
}

function selectStyle(id, el) {
  document.querySelectorAll('.style-card').forEach(c => { if (c !== el) c.classList.remove('selected'); });
  el.classList.toggle('selected');
  if (el.classList.contains('selected')) {
    selectedStyle = id;
    const firstSub = el.querySelector('.sub-style-option.active');
    selectedSub = firstSub ? firstSub.dataset.sub : null;
  } else {
    selectedStyle = null; selectedSub = null;
  }
  updateBottomBar();
}

function selectSub(styleId, subName, el) {
  const card = el.closest('.style-card');
  card.querySelectorAll('.sub-style-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  selectedStyle = styleId; selectedSub = subName;
  // Update preview with sub-style colors
  const layout = card.dataset.layout;
  const colors = el.querySelectorAll('.sub-style-dot');
  if (colors.length >= 3 && layout) {
    const newPv = {
      bg: rgbToHex(getComputedStyle(colors[0]).backgroundColor),
      fg: rgbToHex(getComputedStyle(colors[1]).backgroundColor),
      accent: rgbToHex(getComputedStyle(colors[2]).backgroundColor),
      layout: layout
    };
    const wrap = card.querySelector('.preview-wrap');
    if (wrap) wrap.innerHTML = buildPreview(newPv);
  }
  updateBottomBar();
}

function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m || m.length < 3) return rgb;
  return '#' + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

function updateBottomBar() {
  const text = document.getElementById('selectionText');
  const btn = document.getElementById('confirmBtn');
  if (!selectedStyle) { text.textContent = '点击卡片选择风格'; text.className = 'selection empty'; btn.disabled = true; return; }
  btn.disabled = false; text.className = 'selection';
  const all = [...PPT_SECTIONS.flatMap(s=>s.styles), ...WEB_STYLES];
  const s = all.find(x => x.id === selectedStyle);
  text.textContent = (s ? s.name : selectedStyle) + (selectedSub ? ` → ${selectedSub}` : '');
}

function confirmSelection() {
  if (!selectedStyle) return;
  const all = [...PPT_SECTIONS.flatMap(s=>s.styles), ...WEB_STYLES];
  const s = all.find(x => x.id === selectedStyle);
  const result = { category: currentTab === 'ppt' ? 'ppt' : 'web', styleId: selectedStyle, styleName: s ? s.name : selectedStyle, subStyle: selectedSub, tags: s ? s.tags : [] };
  const json = JSON.stringify(result, null, 2);
  document.getElementById('resultBox').textContent = json;
  navigator.clipboard.writeText(json).then(() => { document.getElementById('successOverlay').classList.add('show'); }).catch(() => { document.getElementById('successOverlay').classList.add('show'); });
}

function closeOverlay() { document.getElementById('successOverlay').classList.remove('show'); }

function goToTastePicker() {
  const styleJson = document.getElementById('resultBox').textContent;
  const params = new URLSearchParams(window.location.search);
  const colors = params.get('colors') || '';
  let url = 'taste-picker.html?style=' + encodeURIComponent(styleJson);
  if (colors) url += '&colors=' + colors;
  window.location.href = url;
}

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  const btn = document.getElementById('darkToggle');
  btn.classList.toggle('active', isDark);
  btn.innerHTML = isDark ? '&#9788; Light' : '&#9790; Dark';
}

loadColors();

// Double-click header to scroll to top
document.querySelector('header').addEventListener('dblclick', () => {
  window.scrollTo({top: 0, behavior: 'smooth'});
});
renderPPT();
renderWeb();
</script>
